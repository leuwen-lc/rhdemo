{{- if .Values.gateway.enabled }}
{{- range .Values.gateway.routes }}
{{- $route := . }}
# ═══════════════════════════════════════════════════════════════
# HTTPRoute: {{ .name }}
# ═══════════════════════════════════════════════════════════════
# Route le trafic vers le service backend.
# S'attache au shared-gateway dans nginx-gateway (cross-namespace).
#
# Headers de sécurité STATIQUES (ResponseHeaderModifier) :
#   Les headers à valeur fixe sont injectés ici par NGF — équivalent des
#   add_header Nginx en ephemere. ResponseHeaderModifier modifie la réponse
#   vers le navigateur (RequestHeaderModifier ne sert qu'à supprimer Forwarded).
#   Pour rhdemo : les headers DYNAMIQUES (CSP avec URL Keycloak) restent dans
#   Spring Security (SecurityConfig.java). Pour keycloak : tous les headers sont statiques.
# ═══════════════════════════════════════════════════════════════
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "rhdemo.labels" $ | nindent 4 }}
    app.kubernetes.io/component: route
spec:
  parentRefs:
  - name: {{ $.Values.gateway.sharedGateway.name }}
    namespace: {{ $.Values.gateway.sharedGateway.namespace }}
    sectionName: {{ $.Values.gateway.sharedGateway.sectionName }}
  hostnames:
  - {{ .hostname | quote }}
  rules:
  {{- range .rules }}
  - matches:
    - path:
        type: {{ .pathType }}
        value: {{ .path }}
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        remove:
          - Forwarded
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
          - name: Cross-Origin-Opener-Policy
            value: {{ $route.securityHeaders.coop | default "same-origin" | quote }}
          - name: Cross-Origin-Resource-Policy
            value: {{ $route.securityHeaders.corp | default "same-origin" | quote }}
          {{- if $route.securityHeaders.coep }}
          - name: Cross-Origin-Embedder-Policy
            value: {{ $route.securityHeaders.coep | quote }}
          {{- end }}
          {{- if $route.securityHeaders.hsts }}
          - name: Strict-Transport-Security
            value: {{ $route.securityHeaders.hsts | quote }}
          {{- end }}
          {{- if $route.securityHeaders.permissionsPolicy }}
          - name: Permissions-Policy
            value: {{ $route.securityHeaders.permissionsPolicy | quote }}
          {{- end }}
    backendRefs:
    - name: {{ .serviceName }}
      port: {{ .servicePort }}
  {{- end }}
{{- end }}
{{- end }}
