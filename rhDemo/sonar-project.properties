# Configuration SonarQube pour rhDemo
sonar.projectKey=rhdemo-api
sonar.projectName=RHDemo API
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions de la couverture de code (les classes restent analysées pour qualité/sécurité,
# seule la mesure de couverture est exclue). Justifications dans docs/TESTS_REFONTE.md §4.
#  - RhdemoApplication : main() Spring Boot, boilerplate non testable hors démarrage complet.
#  - SecurityConfig / SpaCsrfTokenRequestHandler : @Profile("!test"), configuration déclarative
#    Spring Security DSL non exercée en test (la matrice d'autorisation et la CSP sont validées
#    via TestSecurityConfig + CspPolicyBuilderTest).
#  - WebMvcConfig : mapping statique de ressources, pas de logique testable.
#  - FrontendController : sert index.html en pass-through, validé fonctionnellement par Selenium.
sonar.coverage.exclusions=\
    **/RhdemoApplication.java,\
    **/springconfig/SecurityConfig.java,\
    **/springconfig/SpaCsrfTokenRequestHandler.java,\
    **/springconfig/WebMvcConfig.java,\
    **/controller/FrontendController.java

# Stratégie de filtrage des issues :
# - Garder TOUTES les règles de type SECURITY (tous niveaux)
# - Pour les autres types : ne garder que BLOCKER, CRITICAL, MAJOR

# Ignorer MINOR et INFO SAUF pour les règles de sécurité
sonar.issue.ignore.multicriteria=e1,e2

# Ignorer les règles MINOR sauf celles de type SECURITY
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.severity=MINOR
# Exception : ne pas ignorer si c'est une règle de sécurité
sonar.issue.enforce.multicriteria=s1,s2

# Forcer l'application de TOUTES les règles de type SECURITY
sonar.issue.enforce.multicriteria.s1.ruleKey=java:S*
sonar.issue.enforce.multicriteria.s1.type=SECURITY_HOTSPOT

sonar.issue.enforce.multicriteria.s2.ruleKey=java:S*
sonar.issue.enforce.multicriteria.s2.type=VULNERABILITY

# Ignorer les règles INFO sauf celles de sécurité
sonar.issue.ignore.multicriteria.e2.ruleKey=*
sonar.issue.ignore.multicriteria.e2.severity=INFO
