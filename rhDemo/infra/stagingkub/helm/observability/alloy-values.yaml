# Configuration Grafana Alloy (remplace Promtail, EOL depuis le 02/03/2026)
# Chart: grafana/alloy 1.11.0 (Alloy v1.18.0)
# Version figée dans install-observability.sh

###########################################
# CRDs
###########################################
# La CRD podlogs.monitoring.grafana.com (discovery de logs par CRD) n'est pas
# utilisée ici : la config ci-dessous fait de la découverte statique via
# discovery.kubernetes, pas de discovery.relabel via CRD. La désactiver évite
# tout ajout RBAC CRD côté jenkins-infra-upgrader.
crds:
  create: false

###########################################
# Configuration Alloy (langage Alloy, remplace la config YAML de Promtail)
###########################################
alloy:
  configMap:
    content: |
      // Découverte des pods du namespace rhdemo-stagingkub (même périmètre que Promtail)
      discovery.kubernetes "pods" {
        role = "pod"
        namespaces {
          names = ["rhdemo-stagingkub"]
        }
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        // Garder seulement les pods avec label app
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          action        = "keep"
          regex         = ".+"
        }
        // Namespace
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        // Pod name
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        // Container name
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        // App label
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        // Component label
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          target_label  = "component"
        }
        // Job: namespace/app
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app"]
          separator     = "/"
          target_label  = "job"
        }
        // Path to logs - Format: /var/log/pods/<namespace>_<podname>_<uid>/<container>/*.log
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = ";"
          regex         = "(.+);(.+);(.+);(.+)"
          target_label  = "__path__"
          replacement   = "/var/log/pods/${1}_${2}_${3}/${4}/*.log"
        }
      }

      // Lecture des fichiers en hostPath (pas de flux réseau vers les pods sources)
      local.file_match "pods" {
        path_targets = discovery.relabel.pods.output
      }

      loki.source.file "pods" {
        targets    = local.file_match.pods.targets
        forward_to = [loki.process.cri.receiver]
      }

      // Parsing du format CRI (équivalent du pipeline_stage "cri" de Promtail)
      loki.process "cri" {
        stage.cri {}
        forward_to = [loki.write.default.receiver]
      }

      // Push vers Loki (FQDN pour résolution DNS cross-namespace)
      loki.write "default" {
        endpoint {
          url       = "http://loki-gateway.loki-stack.svc.cluster.local/loki/api/v1/push"
          tenant_id = ""
        }
      }

  ###########################################
  # Resources
  ###########################################
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
