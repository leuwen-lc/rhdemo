# Role pour jenkins-infra-upgrader dans le namespace cilium-secrets.
#
# Namespace créé par le chart Cilium lui-même (templates/cilium-secrets-namespace.yaml,
# secretsNamespace.create=true pour la synchro TLS Envoy/Ingress/Gateway API —
# fonctionnalité présente mais non utilisée ici, aucune Ingress/Gateway API
# Cilium activée dans ce projet). Ne contient QUE deux Role/RoleBinding gérés
# par la release Helm "cilium" — vérifié par inventaire exhaustif du cluster
# réel (kubectl get all,role,rolebinding,secret,configmap,serviceaccount -n
# cilium-secrets) : `cilium-tlsinterception-secrets` (subject ServiceAccount
# cilium) et `cilium-operator-tlsinterception-secrets` (subject ServiceAccount
# cilium-operator), tous deux dans kube-system.
#
# Comme pour cilium-operator-ztunnel/cilium-config-agent (kube-system) :
# jamais de `create` (RBAC Kubernetes ne permet pas de restreindre `create`
# par `resourceNames` — l'accorder ouvrirait la création d'un Role/RoleBinding
# arbitraire dans ce namespace). La création initiale de ces deux objets est
# une opération admin ponctuelle (comme la release Cilium elle-même).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-infra-upgrader-cilium-secrets-role
  namespace: cilium-secrets
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    resourceNames: ["cilium-tlsinterception-secrets", "cilium-operator-tlsinterception-secrets"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-infra-upgrader-cilium-secrets-rolebinding
  namespace: cilium-secrets
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
subjects:
  - kind: ServiceAccount
    name: jenkins-infra-upgrader
    namespace: rhdemo-stagingkub
roleRef:
  kind: Role
  name: jenkins-infra-upgrader-cilium-secrets-role
  apiGroup: rbac.authorization.k8s.io
