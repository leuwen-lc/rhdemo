name: Renovate

on:
  schedule:
    - cron: '0 3 * * *'  # chaque nuit à 3h
  workflow_dispatch:

jobs:
  renovate:
    runs-on: codeberg-small
    timeout-minutes: 60
    container:
      image: renovate/renovate:43.217.1
    steps:
      - name: Run Renovate
        env:
          RENOVATE_GPG_KEY: ${{ secrets.RENOVATE_GPG_KEY }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://codeberg.org
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: leuwen-lc/rhdemo
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GH_TOKEN }}
          LOG_LEVEL: info
          RENOVATE_REQUIRE_CONFIG: "optional"
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PR_HOURLY_LIMIT: "2"
          RENOVATE_BRANCH_CONCURRENCY: "3"
        run: |
          set -euo pipefail

          export GNUPGHOME="${HOME}/.gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf 'pinentry-mode loopback\n' >> "$GNUPGHOME/gpg.conf"

          echo "$RENOVATE_GPG_KEY" | base64 -d | gpg --batch --import

          KEY_ID="$(gpg --list-secret-keys --keyid-format LONG --with-colons | awk -F: '/^sec:/ { print $5; exit }')"
          test -n "$KEY_ID"

          git config --global user.signingkey "$KEY_ID"
          git config --global commit.gpgsign true
          git config --global gpg.program gpg

          renovate
