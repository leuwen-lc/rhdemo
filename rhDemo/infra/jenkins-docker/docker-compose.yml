services:
  # ═══════════════════════════════════════════════════════════════════
  # DOCKER SOCKET PROXY - Accès filtré au daemon Docker
  # ═══════════════════════════════════════════════════════════════════
  # Seul ce service monte /var/run/docker.sock. Il expose une API TCP
  # filtrée au controller Jenkins : uniquement création/arrêt/suppression
  # de conteneurs (agents éphémères). Tout le reste est bloqué.
  # ═══════════════════════════════════════════════════════════════════
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: rhdemo-docker-socket-proxy
    restart: unless-stopped
    privileged: true

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      # Cycle de vie des conteneurs (agents éphémères)
      CONTAINERS: 1
      POST: 1       # POST /containers/create + /start + /stop
      DELETE: 1     # DELETE /containers/{id} (nettoyage post-build)
      # Vérification de compatibilité API (GET /version, GET /_ping)
      INFO: 1
      # Inspection réseau lors de la création du conteneur
      NETWORKS: 1
      # Tout le reste est bloqué
      BUILD: 0
      IMAGES: 1     # GET /images/{name}/json (vérification existence avant création agent)
      VOLUMES: 0
      SWARM: 0
      EXEC: 0
      AUTH: 0
      SECRETS: 0

    networks:
      - jenkins-network

  # ═══════════════════════════════════════════════════════════════════
  # JENKINS CONTROLLER (master) - Pilotage uniquement
  # ═══════════════════════════════════════════════════════════════════
  # Le master ne fait qu'orchestrer les pipelines et gérer l'interface.
  # Les builds sont délégués à des agents éphémères créés à la demande
  # via le Docker Plugin (Docker Cloud). Le controller ne monte pas le
  # socket Docker directement — il passe par docker-socket-proxy.
  # ═══════════════════════════════════════════════════════════════════
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: rhdemo-jenkins:latest
    container_name: rhdemo-jenkins
    restart: unless-stopped
    stop_grace_period: 60s

    ports:
      - "8080:8080"      # Interface Web Jenkins
      - "50000:50000"    # Port agents Jenkins (WebSocket/JNLP)

    volumes:
      # Persistance des données Jenkins
      - jenkins_home:/var/jenkins_home

      # Configuration as Code (JCasC)
      - ./jenkins-casc.yaml:/var/jenkins_home/casc_configs/jenkins.yaml:ro

    environment:
      # Désactiver le setup wizard
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

      # Configuration as Code
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs

      # Chemin hôte du dépôt (pour montage cert registry dans les agents)
      - REPOSITORY_PATH=${REPOSITORY_PATH:?Définir REPOSITORY_PATH dans .env (chemin absolu vers la racine du dépôt)}

      # Credentials depuis .env (tokens gérés dans l'interface Jenkins)
      - JENKINS_ADMIN_USER=${JENKINS_ADMIN_USER:-admin}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:?Définir JENKINS_ADMIN_PASSWORD dans .env avant de démarrer}
      - JENKINS_CLAUDE_PASSWORD=${JENKINS_CLAUDE_PASSWORD:?Définir JENKINS_CLAUDE_PASSWORD dans .env avant de démarrer}

      # Timezone
      - TZ=${TZ:-Europe/Paris}

    networks:
      - jenkins-network

    depends_on:
      - docker-socket-proxy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════
  # SONARQUBE - Analyse qualité du code
  # ═══════════════════════════════════════════════════════════════════
  sonarqube:
    image: sonarqube:26.5.0.122743-community
    container_name: rhdemo-sonarqube
    restart: unless-stopped
    stop_grace_period: 30s  # Temps d'arrêt gracieux

    ports:
      - "9020:9000"

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar123}
      - SONAR_WEB_PORT=9000
    
      # Limiter Elasticsearch (Search)
      - SONAR_SEARCH_JAVAOPTS=-Xms512m -Xmx512m
      # Limiter le Web
      # SONAR_WEB_JAVAOPTS=-Xms512m -Xmx512m
      # Limiter le Compute Engine
      # SONAR_CE_JAVAOPTS=-Xms512m -Xmx512m

    networks:
      - jenkins-network

    depends_on:
      sonarqube-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════
  # SONARQUBE DATABASE - PostgreSQL
  # ═══════════════════════════════════════════════════════════════════
  sonarqube-db:
    image: postgres:18-alpine
    container_name: rhdemo-sonarqube-db
    restart: unless-stopped

    volumes:
      - sonarqube_db:/var/lib/postgresql/data

    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar123}
      - POSTGRES_DB=sonar

    networks:
      - jenkins-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════
  # DOCKER REGISTRY LOCAL (HTTPS - pour stocker les images)
  # ═══════════════════════════════════════════════════════════════════
  # Prérequis: Générer les certificats avec ./init-registry-certs.sh
  # puis configurer Docker daemon (voir instructions dans le script)
  # ═══════════════════════════════════════════════════════════════════
  registry:
    image: registry:3
    container_name: kind-registry
    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - registry_data:/var/lib/registry
      # Certificats TLS pour HTTPS
      - ./certs/registry:/certs:ro

    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
      # Configuration TLS
      - REGISTRY_HTTP_TLS_CERTIFICATE=/certs/registry.crt
      - REGISTRY_HTTP_TLS_KEY=/certs/registry.key

    networks:
      - jenkins-network

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost:5000/v2/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


# ═══════════════════════════════════════════════════════════════════
# VOLUMES PERSISTANTS
# ═══════════════════════════════════════════════════════════════════
volumes:
  jenkins_home:
    name: rhdemo-jenkins-home
    driver: local

  maven_repository:
    name: rhdemo-maven-repository
    driver: local

  sonarqube_data:
    name: rhdemo-sonarqube-data
    driver: local

  sonarqube_extensions:
    name: rhdemo-sonarqube-extensions
    driver: local

  sonarqube_logs:
    name: rhdemo-sonarqube-logs
    driver: local

  sonarqube_db:
    name: rhdemo-sonarqube-db
    driver: local

  registry_data:
    name: kind-registry-data
    driver: local

  trivy_cache:
    name: rhdemo-trivy-cache
    driver: local

  wdm_cache:
    name: rhdemo-wdm-cache
    driver: local

# ═══════════════════════════════════════════════════════════════════
# RÉSEAU
# ═══════════════════════════════════════════════════════════════════
networks:
  jenkins-network:
    name: rhdemo-jenkins-network
    driver: bridge
