user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security: masquer la version nginx (protection Trivy/ZAP)
    server_tokens off;

    # Rate limiting — zones partagées (http block obligatoire)
    # Clé : $binary_remote_addr → limite PAR ADRESSE IP (chaque IP a son propre compteur).
    # Un utilisateur légitime actif ne pénalise pas les autres.
    # Cible : attaquant sur une IP unique (scanner, brute-force) — botnet hors scope.
    # rhdemo_global : navigation SPA complète (assets + pages)
    limit_req_zone $binary_remote_addr zone=rhdemo_global:10m   rate=60r/m;
    # rhdemo_api    : endpoints REST uniquement (burst élevé pour tests Selenium CI)
    limit_req_zone $binary_remote_addr zone=rhdemo_api:10m      rate=30r/m;
    # keycloak_login: toutes les requêtes passant par le vhost Keycloak (navigateur uniquement,
    #                 les appels Spring Boot → Keycloak sont directs en interne)
    limit_req_zone $binary_remote_addr zone=keycloak_login:10m  rate=5r/m;
    limit_req_status 429;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/x-javascript;

    # Default server for healthchecks
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        location /health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
        
        location / {
            return 444;  # Close connection without response
        }
    }

    # Include virtual host configurations
    include /etc/nginx/conf.d/*.conf;
}
