name: Renovate

on:
  schedule:
    - cron: '0 3 * * *'  # chaque nuit à 3h
  workflow_dispatch:

jobs:
  renovate:
    runs-on: codeberg-small
    container:
      image: renovate/renovate:43.217.1
    steps:
      - name: Run Renovate
        env:
          RENOVATE_GPG_KEY: ${{ secrets.RENOVATE_GPG_KEY }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://codeberg.org
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: leuwen-lc/rhdemo
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GH_TOKEN }}
        run: |
          echo "$RENOVATE_GPG_KEY" | base64 -d | gpg --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)
          git config --global user.signingkey "$KEY_ID"
          git config --global commit.gpgsign true
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          renovate
          [ -n "$GITHUB_STEP_SUMMARY" ] && echo "Renovate completed" >> "$GITHUB_STEP_SUMMARY" || true
