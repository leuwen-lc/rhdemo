<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trop de requêtes — RHDemo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #303133;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    p  { font-size: 14px; color: #606266; line-height: 1.6; margin-bottom: 8px; }
    .code { font-size: 12px; color: #909399; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⏳</div>
    <h1>Trop de requêtes</h1>
    <p>Vous avez effectué trop d'actions en peu de temps.</p>
    <p>Veuillez patienter quelques secondes puis réessayer.</p>
    <p class="code">HTTP 429 — Too Many Requests</p>
  </div>
</body>
</html>
