# Role pour jenkins-infra-upgrader dans le namespace kube-system (Cilium).
#
# Cilium bootstrappe lui-même ses propres CRDs (cilium.io) au démarrage de
# l'agent/operator, via SA propre — vérifié en inspectant le chart Cilium
# 1.18.6 (aucun dossier crds/, aucune CRD dans `helm template --include-crds`).
# jenkins-infra-upgrader n'a donc besoin QUE des objets que la release Helm
# gère directement (DaemonSet, Deployment, ConfigMap, ServiceAccounts), et
# UNIQUEMENT ceux nommément listés ci-dessous — jamais un accès générique à
# kube-system (voir jenkins-infra-upgrader-clusterrole.yaml pour le
# ClusterRole/ClusterRoleBinding `cilium`/`cilium-operator` eux-mêmes).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-infra-upgrader-kube-system-role
  namespace: kube-system
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    resourceNames: ["cilium"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    resourceNames: ["cilium-operator"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cilium-config"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cilium-ca", "hubble-server-certs", "hubble-relay-client-certs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    resourceNames: ["cilium", "cilium-operator", "cilium-envoy"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Compromis assumé : pas de `resourceNames` ici, contrairement à toutes les
  # autres règles de ce fichier. Les pods du DaemonSet Cilium ont un nom
  # généré (suffixe aléatoire) qui change à chaque rollout/redémarrage — un
  # `resourceNames` figé casserait la lecture de logs dès le premier
  # redéploiement. Conséquence acceptée : lecture (get/list/watch, jamais
  # d'écriture) de TOUS les pods et logs de kube-system (kube-apiserver, etcd,
  # coredns, kube-proxy, kindnet...), pas seulement ceux de Cilium — vérifié
  # avec `kubectl auth can-i get pods -n kube-system --as=...` (retourne
  # "yes"). Risque limité à une fuite de confidentialité en lecture seule
  # (contenu de logs d'autres composants système), jamais à une élévation de
  # privilège ou une action d'écriture.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Role/RoleBinding namespacés `cilium-operator-ztunnel` (RBAC propre à
  # l'operator Cilium pour gérer les DaemonSets ztunnel — cf. chart >=1.19,
  # toujours rendu même si ztunnel/ambient mesh n'est pas activé). Jamais de
  # `create` ici (RBAC Kubernetes ne permet pas de restreindre `create` par
  # `resourceNames` : l'accorder ouvrirait la création d'un Role/RoleBinding
  # arbitraire dans kube-system, pas seulement celui-ci) — même principe que
  # `create` interdit sur ClusterRole/ClusterRoleBinding ci-dessous. La
  # création initiale de ces deux objets est donc une opération admin
  # ponctuelle (comme pour la release Cilium elle-même).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    resourceNames: ["cilium-operator-ztunnel"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Note volontaire : aucun droit sur customresourcedefinitions.cilium.io
  # (Cilium les gère lui-même, cf. commentaire ci-dessus) ni sur les
  # ClusterRole/ClusterRoleBinding `cilium`/`cilium-operator` (portés par
  # jenkins-infra-upgrader-clusterrole.yaml, cluster-scoped par nature).
  #
  # Hormis la règle pods/pods-log ci-dessus (seule exception documentée),
  # aucune règle générique (`resourceNames` absent) sur kube-system : toute
  # nouvelle ressource nommée introduite par une future version de Cilium
  # nécessite un ajout explicite et revu ici, jamais un accès par défaut.
  #
  # Volontairement absent : tout droit sur `secrets` sans `resourceNames`.
  # Helm a besoin de lister ses propres secrets de suivi de release
  # (`sh.helm.release.v1.cilium.v<N>`, nom non fixe) — impossible à restreindre
  # par `resourceNames`. Plutôt que d'élargir cette règle à tout kube-system,
  # la release Cilium utilise `--set namespaceOverride=kube-system` avec le
  # stockage Helm dans un namespace dédié `cilium-release` (voir
  # jenkins-infra-upgrader-cilium-release-role.yaml et
  # install-or-upgrade-cilium.sh).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-infra-upgrader-kube-system-rolebinding
  namespace: kube-system
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
subjects:
  - kind: ServiceAccount
    name: jenkins-infra-upgrader
    namespace: rhdemo-stagingkub
roleRef:
  kind: Role
  name: jenkins-infra-upgrader-kube-system-role
  apiGroup: rbac.authorization.k8s.io
