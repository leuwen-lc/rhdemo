# ServiceAccount pour Jenkins - utilisé pour la mise à jour en place des
# composants d'infrastructure (Cilium, NGINX Gateway Fabric, kube-prometheus-stack,
# Loki, Promtail, Grafana) par le pipeline RHDemo-Stagingkub-Upgrade-Deploy.
#
# Volontairement distinct de jenkins-deployer (utilisé par RHDemo-CD pour
# déployer l'application) : ce dernier ne doit jamais hériter des droits
# élargis (kube-system, CRDs, ClusterRoles) nécessaires à cette option.
# Voir rhDemo/docs/STAGINGKUB_REBUILD_PIPELINE.md (étape 3) pour le détail
# de l'étude ayant motivé cette séparation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-infra-upgrader
  namespace: rhdemo-stagingkub
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
    app.kubernetes.io/managed-by: manual
---
# Secret pour stocker le token du ServiceAccount (requis depuis K8s 1.24+)
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-infra-upgrader-token
  namespace: rhdemo-stagingkub
  annotations:
    kubernetes.io/service-account.name: jenkins-infra-upgrader
  labels:
    app.kubernetes.io/name: jenkins-infra-upgrader
    app.kubernetes.io/component: ci-cd-infra-upgrade
type: kubernetes.io/service-account-token
