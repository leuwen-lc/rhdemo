# ═══════════════════════════════════════════════════════════════════
# JENKINS CONFIGURATION AS CODE (JCasC)
# Configuration automatique de Jenkins au démarrage
# ═══════════════════════════════════════════════════════════════════

jenkins:
  # ────────────────────────────────────────────────────────────────
  # CONFIGURATION SYSTÈME
  # ────────────────────────────────────────────────────────────────
  systemMessage: |
    🚀 Jenkins RHDemo - Serveur CI/CD (Controller)
    Configuré automatiquement avec Jenkins Configuration as Code
    Le master ne fait que du pilotage. Les builds sont exécutés sur l'agent "builder".

  # Le master ne doit pas exécuter de builds (sécurité)
  numExecutors: 0
  mode: EXCLUSIVE

  quietPeriod: 5
  scmCheckoutRetryCount: 3

  # ────────────────────────────────────────────────────────────────
  # AGENTS ÉPHÉMÈRES — Docker Cloud
  # ────────────────────────────────────────────────────────────────
  # Les agents sont créés à la demande pour chaque build et détruits
  # après 5 minutes d'inactivité (réutilisation possible entre builds rapprochés).
  # Pas d'agent permanent. Le controller passe par docker-socket-proxy (TCP filtré).
  # ────────────────────────────────────────────────────────────────
  clouds:
    - docker:
        name: "docker-local"
        dockerApi:
          dockerHost:
            uri: "tcp://docker-socket-proxy:2375"
        templates:
          - labelString: "builder"
            dockerTemplateBase:
              image: "rhdemo-jenkins-agent:latest"
              mountsString: |
                type=bind,source=/var/run/docker.sock,destination=/var/run/docker.sock
                type=bind,source=/usr/bin/docker,destination=/usr/bin/docker
                type=volume,source=rhdemo-maven-repository,destination=/home/jenkins/.m2
                type=volume,source=rhdemo-trivy-cache,destination=/home/jenkins/.cache/trivy
                type=volume,source=rhdemo-wdm-cache,destination=/home/jenkins/.cache/selenium
                type=bind,source=${REPOSITORY_PATH}/rhDemo/infra/jenkins-docker/certs/registry/registry.crt,destination=/etc/ssl/certs/registry.crt,readonly
              network: "rhdemo-jenkins-network"
              extraGroupsString: "984"
              environmentsString: |
                JAVA_HOME=/opt/java/temurin-25
                MAVEN_HOME=/opt/maven
                PATH=/opt/java/temurin-25/bin:/opt/maven/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            remoteFs: "/home/jenkins/agent"
            connector:
              jnlp:
                jenkinsUrl: "http://jenkins:8080/"
            retentionStrategy:
              idleMinutes: 5
            instanceCapStr: "2"
            removeVolumes: false
            pullStrategy: PULL_NEVER

  # ────────────────────────────────────────────────────────────────
  # SÉCURITÉ
  # ────────────────────────────────────────────────────────────────
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
          name: "Administrator"
          description: "Jenkins Administrator"
        - id: "claude"
          password: "${JENKINS_CLAUDE_PASSWORD}"
          name: "Claude Code"
          description: "Compte lecture seule pour Claude Code (/fixcve)"

  authorizationStrategy:
    globalMatrix:
      entries:
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"
              - "Overall/Read"
        - user:
            name: "claude"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "View/Read"
  
  
# ═══════════════════════════════════════════════════════════════════
# CONFIGURATION DES OUTILS (JDK, Maven, etc.)
# ═══════════════════════════════════════════════════════════════════
tool:
  # JDK 25 (Eclipse Temurin, installé dans l'image Docker)
  jdk:
    installations:
      - name: "JDK25"
        home: "/opt/java/temurin-25"
  
  # Maven (déjà installé dans l'image Docker)
  maven:
    installations:
      - name: "Maven3"
        home: "/opt/maven"
  
  # Git (déjà installé sur le système)
  git:
    installations:
      - name: "Default"
        home: "git"

  # OWASP Dependency-Check
  dependency-check:
    installations:
      - name: "dependency-check-9.2.0"
        properties:
          - installSource:
              installers:
                - dependencyCheckInstaller:
                    id: "9.2.0"

# ═══════════════════════════════════════════════════════════════════
# CREDENTIALS
# ⚠️  Les credentials sont gérés manuellement dans Jenkins UI
#     pour permettre la persistance entre les redémarrages
#
# Liste des credentials à créer manuellement :
#
# 1. sops-age-key (Secret file)
#    - Type: Secret file
#    - ID: sops-age-key
#    - File: Votre fichier de clé AGE privée (~/.config/sops/age/keys.txt)
#    - Description: SOPS AGE Private Key for decrypting secrets
#
# 2. jenkins-sonar-token (Secret text - optionnel)
#    - Type: Secret text
#    - ID: jenkins-sonar-token
#    - Secret: ${SONAR_TOKEN}
#    - Description: SonarQube Authentication Token
#
# 3. nvd-api-key (Secret text - recommandé pour OWASP Dependency-Check)
#    - Type: Secret text
#    - ID: nvd-api-key
#    - Secret: ${NVD_API_KEY}
#    - Description: NVD API Key for OWASP Dependency-Check
#    - Obtenir une clé sur: https://nvd.nist.gov/developers/request-an-api-key
#  
# 4. kubeconfig-stagingkub
#    - Type: Secret file
#    - ID: kubeconfig-stagingkub
#    - Contient le token de connexion Jenkins à l'environnement stagingkub (controles RBAC)
#    - Pointer sur rhDemo/infra/stagingkub/jenkins-kubeconfig/kubeconfig-jenkins-rbac.yaml
#
# 5. forgejo-api-token
#    - Type: Secret text
#    - ID: forgejo-api-token
#    - Secret: token dédié Codeberg, scope "repository" uniquement (pas d'accès admin)
#    - Généré sur: https://codeberg.org/user/settings/applications
#    - Usage: RHDemo-Renovate (liste/merge des PRs Renovate + commentaires)
#    - Distinct du token utilisé par /fixcve-auto (isolation des responsabilités)


# ═══════════════════════════════════════════════════════════════════
# CONFIGURATION GLOBALE
# ═══════════════════════════════════════════════════════════════════
unclassified:
  # Configuration SonarQube
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "${SONAR_URL:-http://sonarqube:9000}"
        credentialsId: "jenkins-sonar-token"

  

  # Configuration Location
  location:
    url: "http://jenkins:8080/"
    adminAddress: "jenkins@example.com"

# ═══════════════════════════════════════════════════════════════════
# JOBS - Pipelines RHDemo
# ═══════════════════════════════════════════════════════════════════
jobs:
  # ─────────────────────────────────────────────────────────────────
  # PIPELINE CI - Intégration Continue
  # ─────────────────────────────────────────────────────────────────
  - script: |
      pipelineJob('RHDemo-CI') {
        displayName('RHDemo - CI (Build & Tests)')
        description('''Pipeline d\'Intégration Continue pour RHDemo

        Phases :
        • Build Maven + Tests unitaires
        • Analyse OWASP Dependency-Check
        • Build Docker
        • Tests Selenium + OWASP ZAP (ephemere Docker Compose)
        • Publication de l\'image sur le registry

        📖 Documentation : docs/PIPELINES_CI_CD.md''')

        parameters {
          booleanParam {
            name('RUN_SELENIUM_TESTS')
            defaultValue(true)
            description('Exécuter les tests Selenium')
          }
          booleanParam {
            name('RUN_SONAR')
            defaultValue(true)
            description('Exécuter l\'analyse SonarQube')
          }
          booleanParam {
            name('PUBLISH_IMAGE')
            defaultValue(true)
            description('Publier l\'image sur le registry après validation')
          }
          string {
            name('IMAGE_TAG_SUFFIX')
            defaultValue('')
            description('Suffixe optionnel pour le tag (ex: -rc1, -hotfix)')
            trim(true)
          }
        }

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://codeberg.org/leuwen-lc/rhdemo.git')
                  // Pas de credentials nécessaire pour un repository public
                }
                branches('*/evolutions-post-1.1.8')
                extensions {
                  // Clone superficiel pour accélérer le checkout
                  cloneOptions {
                    shallow(false)
                    depth(0)
                    honorRefspec(true)
                  }
                }
              }
            }
            scriptPath('rhDemo/Jenkinsfile-CI')
            lightweight(true)
          }
        }

        properties {
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('30')
                daysToKeepStr('90')
                artifactNumToKeepStr('10')
                artifactDaysToKeepStr('30')
              }
            }
          }
          disableConcurrentBuilds()
        }

        triggers {
          pollSCM {
            scmpoll_spec('H/5 * * * *')
            ignorePostCommitHooks(false)
          }
        }
      }

  # ─────────────────────────────────────────────────────────────────
  # PIPELINE CD - Déploiement Continu
  # ─────────────────────────────────────────────────────────────────
  - script: |
      pipelineJob('RHDemo-CD') {
        displayName('RHDemo - CD (Deploy Kubernetes)')
        description('''Pipeline de Déploiement Continu sur Kubernetes stagingkub

        Phases :
        • Vérification de l\'image dans le registry
        • Configuration accès Kubernetes (KinD)
        • Mise à jour des secrets Kubernetes
        • Déploiement Helm sur stagingkub
        • Health checks et validation

        Pré-requis :
        • Image publiée par le pipeline CI
        • Cluster KinD initialisé (init-stagingkub.sh)

        📖 Documentation : docs/PIPELINES_CI_CD.md''')

        parameters {
          string {
            name('IMAGE_TAG')
            defaultValue('')
            description('Tag de l\'image à déployer (ex: 1.1.0-SNAPSHOT). Si vide, utilise pom.xml')
            trim(true)
          }
          booleanParam {
            name('FORCE_RECREATE_PODS')
            defaultValue(false)
            description('Forcer la recréation des pods (rollout restart)')
          }
          booleanParam {
            name('SKIP_HEALTH_CHECK')
            defaultValue(false)
            description('Ne pas attendre les health checks (déploiement plus rapide)')
          }
        }

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://codeberg.org/leuwen-lc/rhdemo.git')
                  // Pas de credentials nécessaire pour un repository public
                }
                branches('*/evolutions-post-1.1.8')
                extensions {
                  // Clone superficiel pour accélérer le checkout
                  cloneOptions {
                    shallow(false)
                    depth(0)
                    honorRefspec(true)
                  }
                }
              }
            }
            scriptPath('rhDemo/Jenkinsfile-CD')
            lightweight(true)
          }
        }

        properties {
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('50')
                daysToKeepStr('90')
                artifactNumToKeepStr('10')
                artifactDaysToKeepStr('30')
              }
            }
          }
          disableConcurrentBuilds()
        }
      }

  # ─────────────────────────────────────────────────────────────────
  # PIPELINE RENOVATE - Validation et automerge des PRs Renovate
  # ─────────────────────────────────────────────────────────────────
  - script: |
      pipelineJob('RHDemo-Renovate') {
        displayName('RHDemo - Renovate Automerge')
        description('''Valide et merge automatiquement les PRs Renovate (patch/minor)

        Phases :
        • Liste les PRs Renovate ouvertes via l\'API Forgejo
        • Build Maven + Tests unitaires/intégration + OWASP Dependency-Check par PR
        • Merge automatique via l\'API Forgejo si CI verte, sinon commentaire d\'échec

        Les PRs major restent bloquées côté Renovate (dependencyDashboardApproval).

        📖 Documentation : docs/RENOVATE_AUTOMERGE_CI.md''')

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://codeberg.org/leuwen-lc/rhdemo.git')
                  // Pas de credentials nécessaire pour un repository public
                }
                branches('*/evolutions-post-1.1.8')
                extensions {
                  cloneOptions {
                    shallow(false)
                    depth(0)
                    honorRefspec(true)
                  }
                }
              }
            }
            scriptPath('rhDemo/Jenkinsfile-Renovate')
            lightweight(true)
          }
        }

        properties {
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('15')
                daysToKeepStr('30')
                artifactNumToKeepStr('5')
                artifactDaysToKeepStr('30')
              }
            }
          }
          disableConcurrentBuilds()
        }

        triggers {
          // Se déclenche après Renovate (3h), marge de 1h pour la création des PRs
          cron('H 4 * * *')
        }
      }

