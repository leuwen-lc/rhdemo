# ═══════════════════════════════════════════════════════════════
# Network Policies pour le namespace loki-stack
# ═══════════════════════════════════════════════════════════════
# Ce fichier contient les Network Policies pour sécuriser la stack
# de logging (Loki + Alloy + Grafana) dans le namespace loki-stack.
#
# Stratégie: Zero Trust / Default Deny
#   1. Tout trafic bloqué par défaut
#   2. Whitelist explicite pour chaque flux légitime
#
# Application:
#   kubectl apply -f loki-stack-networkpolicies.yaml
#
# Composants protégés:
#   - Loki (agrégation logs)
#   - Alloy (collecte logs, DaemonSet)
#   - Grafana (visualisation)
# ═══════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  # Appliquer à TOUS les pods du namespace
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # Aucune règle = tout est bloqué
  ingress: []
  egress: []
---
# ═══════════════════════════════════════════════════════════════
# DNS: Autoriser tous les pods à résoudre les noms DNS
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ═══════════════════════════════════════════════════════════════
# Loki (Agrégateur de logs)
# ═══════════════════════════════════════════════════════════════
# INGRESS:
#   - Alloy: push des logs
#   - Grafana: requêtes LogQL
#   - Prometheus (monitoring): scrape métriques
#   - kubelet: health checks
#
# EGRESS:
#   - DNS uniquement (stockage local, pas de S3/GCS)
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loki-netpol
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Alloy (push logs) et Grafana (requêtes LogQL) passent tous les deux
    # par le Service loki-gateway (nginx, port 8080 en interne — voir
    # Service "loki-gateway" : port 80 -> targetPort 8080), jamais
    # directement par le backend (port 3100). "loki" sélectionne ici à la
    # fois le pod gateway ET le pod backend (single-binary) puisqu'ils
    # partagent le label app.kubernetes.io/name: loki — d'où les deux ports
    # dans chaque règle : 8080 pour joindre le pod gateway, 3100 pour le
    # cas où quelque chose s'adresse directement au backend.
    # Alloy (push logs)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki-stack
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3100
    # Grafana (requêtes LogQL)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki-stack
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3100
    # Prometheus scraping (monitoring namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 3100
    # Health checks kubelet
    - ports:
        - protocol: TCP
          port: 3100
  egress:
    # Gateway (nginx) -> backend single-binary : le gateway proxifie toutes
    # les requêtes reçues ci-dessus vers le backend sur le port 3100, donc
    # les pods sélectionnés par cette policy (gateway inclus) ont besoin
    # d'egress vers eux-mêmes sur ce port. Couvre aussi loki-canary (mêmes
    # labels), qui interroge le backend/gateway pour son propre self-check.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki-stack
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - protocol: TCP
          port: 3100
    # DNS uniquement (pas de stockage externe)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ═══════════════════════════════════════════════════════════════
# Alloy (Collecteur de logs - DaemonSet)
# ═══════════════════════════════════════════════════════════════
# INGRESS:
#   - kubelet: health checks
#
# EGRESS:
#   - Loki: push des logs
#   - API Server Kubernetes: découverte des pods (discovery.kubernetes)
#   - DNS
#
# Note: Alloy lit les logs via hostPath (local.file_match +
# loki.source.file), pas de flux réseau vers les pods sources.
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alloy-netpol
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Health checks kubelet
    - ports:
        - protocol: TCP
          port: 12345  # Alloy metrics/health (http-metrics)
  egress:
    # Push logs vers Loki — via loki-gateway (nginx, port 8080 en interne,
    # voir Service "loki-gateway"), pas directement vers le backend (3100) :
    # url du endpoint loki.write dans alloy-values.yaml est
    # http://loki-gateway.loki-stack.svc.cluster.local/loki/api/v1/push.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki-stack
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3100
    # API Server Kubernetes: voir CiliumNetworkPolicy allow-apiserver-alloy
    # (ipBlock standard ne fonctionne pas avec Cilium pour l'identité host)
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ═══════════════════════════════════════════════════════════════
# CiliumNetworkPolicy: Accès API Server pour Alloy
# ═══════════════════════════════════════════════════════════════
# IMPORTANT: Avec Cilium (kubeProxyReplacement=true), l'API Server
# sur le node est vu comme l'entité "host" et non comme un CIDR.
# Les règles ipBlock standard ne fonctionnent pas pour atteindre
# le node host. Cette CiliumNetworkPolicy est requise pour qu'Alloy
# puisse découvrir les pods via discovery.kubernetes.
# ═══════════════════════════════════════════════════════════════
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-alloy
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  egress:
    - toEntities:
        - host
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
# ═══════════════════════════════════════════════════════════════
# Grafana (Visualisation)
# ═══════════════════════════════════════════════════════════════
# INGRESS:
#   - nginx-gateway: trafic utilisateur (HTTPRoute)
#   - Prometheus (monitoring): scrape métriques Grafana
#   - kubelet: health checks
#
# EGRESS:
#   - Loki: requêtes LogQL
#   - Prometheus (monitoring): requêtes PromQL
#   - DNS
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-netpol
  namespace: loki-stack
  labels:
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: rhdemo-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Trafic utilisateur via NGINX Gateway Fabric
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
    # Prometheus scraping (métriques Grafana)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
    # Health checks kubelet
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
  egress:
    # Requêtes vers Loki (LogQL) — via loki-gateway (port 8080 en interne),
    # datasource Grafana configurée sur http://loki-gateway:80.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: loki-stack
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3100
    # Requêtes vers Prometheus (PromQL)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
